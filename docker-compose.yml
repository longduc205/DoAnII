services:
  web:
    build: .
    container_name: ai-vuln-scanner
    ports:
      - "5000:5000"
    volumes:
      # Mount source code for live reload during development
      - .:/app
      # Prevent overwriting container's installed packages
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    restart: unless-stopped
