<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-integrated Web Vulnerability Scanner - Educational Prototype">
    <title>{% block title %}AI VulnScanner{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('main.index') }}">
                <span class="shield-icon">&#x1F6E1;</span>
                AI VulnScanner
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">Home</a></li>
            <li><a href="{{ url_for('scan.new_scan') }}" class="{% if request.endpoint and 'scan' in request.endpoint %}active{% endif %}">New Scan</a></li>
            <li><a href="{{ url_for('history.scan_history') }}" class="{% if request.endpoint == 'history.scan_history' %}active{% endif %}">History</a></li>
            <li><a href="{{ url_for('tasks.task_list') }}" class="{% if request.endpoint == 'tasks.task_list' %}active{% endif %}">Tasks</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 AI Web Vulnerability Scanner - Educational Purpose Only</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
