<!DOCTYPE html>
<html lang="en">
<head>

    <title>{% block title %}AI VulnScanner{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

        <div class="nav-brand">
            <a href="{{ url_for('main.index') }}">🛡️ AI VulnScanner</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.index') }}">Home</a></li>
